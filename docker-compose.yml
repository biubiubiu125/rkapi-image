name: rkapi-image

services:
  rkapi-image:
    image: ghcr.io/biubiubiu125/rkapi-image:latest
    pull_policy: always
    container_name: rkapi-image
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      RKAPI_IMAGE_TASK_DB: /app/backend/data/rkapi-tasks.sqlite
      RKAPI_IMAGE_IMAGE_DIR: /app/backend/data/rkapi-images
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/backend/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/flyreq/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
#    networks:
#      - 1panel-network
    restart: unless-stopped

#networks:
#  1panel-network:
#    external: true
