name: flyreq-image-studio

services:
  flyreq-image-studio:
    image: ghcr.io/doudou770/flyreq-image-studio:latest
    container_name: flyreq-image-studio
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/backend/data
      - ./blacklist.json:/app/backend/blacklist.json
      - ./prompts.json:/app/backend/prompts.json
      - ./.env:/app/backend/.env
    restart: unless-stopped
