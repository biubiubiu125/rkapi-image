name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Tag, release, and publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          package_version="$(node -p "require('./package.json').version")"
          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
          fi

          latest_version="${latest_tag#v}"
          base_version="$(
            printf "%s\n%s\n" "${latest_version}" "${package_version}" |
            sort -V |
            tail -n 1
          )"
          if [[ -z "${base_version}" || "${base_version}" == "0.0.0" ]]; then
            base_version="${package_version}"
          fi

          IFS='.' read -r major minor patch <<< "${base_version}"

          bump="${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}"
          case "${bump}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: ${bump}" >&2
              exit 1
              ;;
          esac

          next="v${major}.${minor}.${patch}"
          while git rev-parse -q --verify "refs/tags/${next}" >/dev/null; do
            patch=$((patch + 1))
            next="v${major}.${minor}.${patch}"
          done

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${next}" >> "$GITHUB_OUTPUT"
          echo "version=${next#v}" >> "$GITHUB_OUTPUT"
          echo "Next release: ${next}"

      - name: Resolve release source revision
        id: source
        shell: bash
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/biubiubiu125/rkapi-image"
          echo "name=${image}" >> "$GITHUB_OUTPUT"
          echo "Image: ${image}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install zip package dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm ci --prefix frontend

      - name: Build zip package
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          node scripts/pack.js

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.tag }}
          labels: |
            org.opencontainers.image.title=RKAPI Image
            org.opencontainers.image.description=Self-hosted AI image generation studio
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RKAPI Image ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          files: out.zip
          body: |
            Docker images have been published to GitHub Container Registry:

            - `${{ steps.image.outputs.name }}:latest`
            - `${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}`
            - `${{ steps.image.outputs.name }}:${{ steps.version.outputs.tag }}`

            The standalone zip package is attached as `out.zip`.

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release edit "${{ steps.version.outputs.tag }}" --draft=false
